name: Weekly Market Opportunity Scan

on:
  schedule:
    # Every Monday at 8:00 AM Central Time (14:00 UTC)
    - cron: '0 14 * * 1'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run market opportunity scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scan.py

      - name: Commit and push report
        run: |
          git config --global user.name "Market Scout Agent"
          git config --global user.email "agent@noreply.github.com"
          git add reports/
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "Weekly scan: $(date '+%Y-%m-%d')"
          git push
